name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  showcase:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: showcase/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          DATABASE_URL: postgresql://mrfox:mrfox_dev@localhost:5432/mrfox_showcase
          AUTH_SECRET: ci-test-secret-minimum-32-characters-long

  engine-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine/api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: engine/api/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: postgresql://mrfox:mrfox_dev@localhost:5432/mrfox_engine
          JWT_SECRET: ci-jwt-secret-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379
